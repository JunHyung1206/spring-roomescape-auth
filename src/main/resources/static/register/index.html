<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 방탈출 예약</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .box {
            background: white;
            border-radius: 10px;
            padding: 40px 36px;
            width: 360px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.4rem;
            color: #2c3e50;
            margin-bottom: 28px;
            text-align: center;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        input:focus { outline: none; border-color: #2c3e50; }

        button {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 4px;
        }

        button:hover { background: #3d5166; }

        .msg {
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
        }

        .msg.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .login-link {
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
            color: #666;
        }

        .login-link a { color: #2c3e50; font-weight: bold; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="box">
    <h1>회원가입</h1>
    <div class="msg" id="msg"></div>
    <label for="name">이름</label>
    <input type="text" id="name" placeholder="이름을 입력하세요">
    <label for="loginId">아이디</label>
    <input type="text" id="loginId" placeholder="아이디를 입력하세요">
    <label for="password">비밀번호</label>
    <input type="password" id="password" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter') register()">
    <button onclick="register()">가입하기</button>
    <div class="login-link">이미 계정이 있으신가요? <a href="/login">로그인</a></div>
</div>

<script>
    async function register() {
        const name = document.getElementById('name').value.trim();
        const loginId = document.getElementById('loginId').value.trim();
        const password = document.getElementById('password').value;

        if (!name || !loginId || !password) {
            showMsg('모든 항목을 입력해주세요.', 'error');
            return;
        }

        const res = await fetch('/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, loginId, password})
        });

        if (res.ok) {
            showMsg('가입이 완료되었습니다. 로그인 페이지로 이동합니다.', 'success');
            setTimeout(() => window.location.href = '/login', 1500);
        } else {
            const err = await res.json().catch(() => ({message: '회원가입에 실패했습니다.'}));
            showMsg(err.message, 'error');
        }
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg ' + type;
        el.style.display = 'block';
    }
</script>
</body>
</html>
