<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모바일 로그인 - 방탈출 예약</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .box {
            background: white; border-radius: 10px;
            padding: 40px 36px; width: 360px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.4rem; color: #2c3e50; margin-bottom: 8px; text-align: center; }
        .badge { text-align: center; font-size: 0.75rem; color: #888; margin-bottom: 24px; }
        label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; }
        input {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ddd; border-radius: 6px;
            font-size: 1rem; margin-bottom: 16px;
        }
        input:focus { outline: none; border-color: #2c3e50; }
        button {
            width: 100%; padding: 12px;
            background: #2c3e50; color: white;
            border: none; border-radius: 6px;
            font-size: 1rem; cursor: pointer;
        }
        button:hover { background: #3d5166; }
        .error {
            background: #f8d7da; color: #721c24;
            border: 1px solid #f5c6cb; border-radius: 6px;
            padding: 10px 14px; font-size: 0.9rem;
            margin-bottom: 16px; display: none;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>방탈출 예약</h1>
    <div class="badge">📱 토큰 방식 (모바일 흉내)</div>
    <div class="error" id="errorMsg"></div>
    <label for="loginId">아이디</label>
    <input type="text" id="loginId" placeholder="user_a" onkeydown="if(event.key==='Enter') login()">
    <label for="password">비밀번호</label>
    <input type="password" id="password" placeholder="1234" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">로그인</button>
</div>

<script>
    async function login() {
        const loginId = document.getElementById('loginId').value.trim();
        const password = document.getElementById('password').value;

        const res = await fetch('/mobile/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({loginId, password})
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({message: '로그인에 실패했습니다.'}));
            showError(err.message);
            return;
        }

        // 👇 토큰 방식의 핵심: 응답에서 토큰을 꺼내서 직접 저장해야 한다
        const { token } = await res.json();
        localStorage.setItem('token', token);

        window.location.href = '/mobile';
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>
</body>
</html>
